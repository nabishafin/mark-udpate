# Redirect all HTTP traffic to the canonical HTTPS root domain.
server {
    listen 80;
    listen [::]:80;

    server_name mdrnlifeddw.com www.mdrnlifeddw.com;
    return 301 https://mdrnlifeddw.com$request_uri;
}

# HTTPS app. The certificate must include BOTH mdrnlifeddw.com and
# www.mdrnlifeddw.com:
# sudo certbot --nginx -d mdrnlifeddw.com -d www.mdrnlifeddw.com
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name mdrnlifeddw.com www.mdrnlifeddw.com;

    ssl_certificate /etc/letsencrypt/live/mdrnlifeddw.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mdrnlifeddw.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /root/mark-udpate/dist;
    index index.html;
    charset utf-8;

    # Canonicalize www after TLS succeeds. This requires the certificate above
    # to include www, otherwise Safari/mobile clients fail before redirecting.
    if ($host = www.mdrnlifeddw.com) {
        return 301 https://mdrnlifeddw.com$request_uri;
    }

    # API requests must reach Node. Without this, nginx/static hosting returns
    # 405 for POST /api/email-support.
    location ^~ /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header X-Powered-By;
    }

    # Shopify checkout/order continuations must leave the static SPA before
    # nginx can serve index.html for them.
    location = /a/checkout {
        return 302 https://orise-6796.myshopify.com$request_uri;
    }

    location ~ ^/(cart/c|cart/[0-9].*|checkouts|wallets/checkouts|orders)(/.*)?$ {
        return 302 https://orise-6796.myshopify.com$request_uri;
    }

    location ~ ^/checkout/.+$ {
        return 302 https://orise-6796.myshopify.com$request_uri;
    }

    location ~ ^/[0-9]+/orders(/.*)?$ {
        return 302 https://orise-6796.myshopify.com$request_uri;
    }

    # Machine-readable SEO files.
    location = /robots.txt {
        try_files /robots.txt =404;
    }

    location = /sitemap.xml {
        try_files /sitemap.xml =404;
    }

    # Generated dynamic content routes need Node to distinguish valid slugs
    # from fake URLs and return the correct HTTP status.
    location ~ ^/(blogs/news/.+|learn/.+)/?$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header X-Powered-By;
    }

    # Known React/Vite SPA routes. These exact/regex rules prevent asset
    # directories such as /products from causing nginx directory redirects.
    location = / {
        try_files /index.html =500;
    }

    location ~ ^/(science|science/lab-testing|benefits|athletes-recovery|healthy-aging|shop|products|cart|products/cart|checkout|login|register|forgot-password|reset-password|account|account/orders|research|blogs|blogs/news|contact|learn|founder|pages/refund)/?$ {
        try_files /index.html =500;
    }

    location ~ ^/(account/orders/.+|account/reset/.+|policies/.+)/?$ {
        try_files /index.html =500;
    }

    # Static assets.
    location ~* \.(?:css|js|mjs|json|map)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(?:png|jpg|jpeg|gif|svg|ico|webp|avif|woff|woff2|ttf|eot)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public";
    }

    # Static files that did not match a known SPA route. Directories and unknown
    # paths return 404 instead of leaking a 403 or fake SPA success.
    location / {
        if (-d $request_filename) {
            return 404;
        }
        try_files $uri =404;
    }

    # Security headers.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https://cdn.shopify.com; connect-src 'self' https://orise-6796.myshopify.com https://mdrnlifeddw.com; frame-src 'self'; form-action 'self' https://orise-6796.myshopify.com; base-uri 'self'; object-src 'none'; upgrade-insecure-requests" always;

    # Compression.
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml;
}
