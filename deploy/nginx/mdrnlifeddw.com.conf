# Redirect all HTTP traffic to the canonical HTTPS root domain.
server {
    listen 80;
    listen [::]:80;

    server_name mdrnlifeddw.com www.mdrnlifeddw.com;
    return 301 https://mdrnlifeddw.com$request_uri;
}

# HTTPS app. The certificate must include BOTH mdrnlifeddw.com and
# www.mdrnlifeddw.com:
# sudo certbot --nginx -d mdrnlifeddw.com -d www.mdrnlifeddw.com
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name mdrnlifeddw.com www.mdrnlifeddw.com;

    ssl_certificate /etc/letsencrypt/live/mdrnlifeddw.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mdrnlifeddw.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /root/mark-udpate/dist;
    index index.html;
    charset utf-8;

    # Canonicalize www after TLS succeeds. This requires the certificate above
    # to include www, otherwise Safari/mobile clients fail before redirecting.
    if ($host = www.mdrnlifeddw.com) {
        return 301 https://mdrnlifeddw.com$request_uri;
    }

    # API requests must reach Node. Without this, nginx/static hosting returns
    # 405 for POST /api/email-support.
    location ^~ /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # React/Vite SPA routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets.
    location ~* \.(?:css|js|mjs|json|map)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(?:png|jpg|jpeg|gif|svg|ico|webp|avif|woff|woff2|ttf|eot)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public";
    }

    # Security headers.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Compression.
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml;
}
