# =============================================================================
# Shopify checkout reverse-proxy for mdrnlifeddw.com  (PRODUCTION nginx)
# -----------------------------------------------------------------------------
# WHY: The site is a static React SPA served by nginx. Shopify checkout lives on
# orise-6796.myshopify.com. To let customers pay WITHOUT leaving mdrnlifeddw.com,
# nginx transparently proxies the Shopify checkout paths + assets to Shopify.
#
# This config mirrors the working Vite dev proxy in vite.config.ts. The key
# lessons baked in here (each one was a real failure we hit while testing):
#   1. Send Host: mdrnlifeddw.com (NOT the myshopify host) or Shopify 301-loops
#      to its canonical domain  -> ERR_TOO_MANY_REDIRECTS.
#   2. Proxy /cdn (+ /wpm /payments /services /.well-known) or the checkout page
#      renders UNSTYLED (its CSS/JS load from same-origin /cdn/... paths).
#   3. This works in production because the browser origin IS https://mdrnlifeddw.com,
#      which matches the canonical URLs + CSP (upgrade-insecure-requests) that the
#      checkout runtime hard-codes. (This is exactly why it can't run on http://localhost.)
#
# HOW TO USE: paste the location block below INSIDE your existing
# `server { listen 443 ssl; server_name mdrnlifeddw.com; ... }` block,
# BEFORE the SPA catch-all `location / { try_files $uri /index.html; }`.
# Then:  sudo nginx -t  &&  sudo systemctl reload nginx
#
# PREREQUISITE: mdrnlifeddw.com must be added in Shopify Admin -> Settings ->
# Domains as a domain of the store, or Shopify may reject the proxied requests.
# =============================================================================

# Runtime DNS resolution for the Shopify upstream (required when using a
# variable in proxy_pass; also avoids nginx caching a stale Shopify IP at boot).
resolver 8.8.8.8 1.1.1.1 valid=300s;

# One regex location covers every path the Shopify checkout needs:
#   /checkouts/...  -> checkout pages
#   /cart/c/...     -> permanent storefront cart checkout links (the checkoutUrl)
#   /a/checkout     -> checkout app endpoint
#   /cdn/...        -> checkout CSS/JS/font assets  (CRITICAL for styling)
#   /wpm /payments /services /.well-known -> checkout runtime endpoints
location ~ ^/(checkouts|cart/c|a/checkout|cdn|wpm|payments|services|\.well-known)(/|$) {
    set $shopify_upstream "orise-6796.myshopify.com";

    proxy_pass               https://$shopify_upstream$request_uri;
    proxy_http_version       1.1;
    proxy_ssl_server_name    on;                       # send SNI = orise-6796.myshopify.com

    # Treat the request as already-canonical so Shopify serves the page instead
    # of redirecting to its primary domain (prevents the redirect loop).
    proxy_set_header Host               mdrnlifeddw.com;
    proxy_set_header X-Forwarded-Host   mdrnlifeddw.com;
    proxy_set_header X-Forwarded-Proto  https;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP          $remote_addr;

    # Keep any Shopify redirects/cookies on your domain.
    proxy_redirect      https://orise-6796.myshopify.com/  https://mdrnlifeddw.com/;
    proxy_cookie_domain orise-6796.myshopify.com           mdrnlifeddw.com;

    # Let Shopify decide compression; pass large checkout payloads through cleanly.
    proxy_buffering     off;
}

# ---- Your existing SPA catch-all MUST stay LAST -----------------------------
# location / {
#     try_files $uri $uri/ /index.html;
# }
